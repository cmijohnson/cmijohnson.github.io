<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博客编辑器 · cmijohnson</title>
  <link rel="icon" href="https://github.com/cmijohnson.png" type="image/png">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0a0e17;--bg2:#0f1520;--surface:#131a2a;--border:#1e2a3a;--text:#e2e8f0;--text2:#8b95a8;--blue:#4f8cff;--purple:#a855f7;--green:#34d399;--red:#ef4444;--radius:10px}
    body{font-family:'Inter','Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    a{color:var(--blue);text-decoration:none}

    /* ── token gate ── */
    .gate{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .gate-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;max-width:520px;width:100%;text-align:center}
    .gate-box h2{margin-bottom:8px;font-size:1.4rem}
    .gate-box p{color:var(--text2);font-size:.88rem;margin-bottom:24px;line-height:1.6}
    .gate-box input{width:100%;padding:12px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.9rem;font-family:inherit;outline:none;margin-bottom:12px}
    .gate-box input:focus{border-color:var(--blue)}
    .gate-box button{width:100%;padding:12px;border-radius:var(--radius);border:none;background:var(--blue);color:#fff;font-size:.95rem;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .2s}
    .gate-box button:hover{opacity:.85}
    .gate-box .hint{font-size:.78rem;color:var(--text2);margin-top:16px;text-align:left;line-height:1.7}
    .gate-box .hint code{background:var(--bg);padding:2px 6px;border-radius:4px;font-size:.75rem}

    /* ── layout ── */
    .app{display:none;height:100vh}
    .sidebar{width:280px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100vh;overflow:hidden}
    .sidebar-head{padding:16px;border-bottom:1px solid var(--border)}
    .sidebar-head .top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .sidebar-head h3{font-size:.95rem;font-weight:600}
    .btn{padding:8px 14px;border-radius:8px;border:none;font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
    .btn-blue{background:var(--blue);color:#fff}
    .btn-blue:hover{opacity:.85}
    .btn-green{background:var(--green);color:#111}
    .btn-green:hover{opacity:.85}
    .btn-red{background:var(--red);color:#fff}
    .btn-red:hover{opacity:.85}
    .btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
    .btn-ghost:hover{background:var(--surface);color:var(--text)}

    /* ── sidebar tabs ── */
    .sidebar-tabs{display:flex;gap:4px}
    .sidebar-tabs .tab{flex:1;padding:7px 0;text-align:center;font-size:.82rem;font-weight:600;cursor:pointer;border-radius:8px;border:1px solid transparent;color:var(--text2);transition:all .15s}
    .sidebar-tabs .tab:hover{color:var(--text);background:var(--surface)}
    .sidebar-tabs .tab.active{color:var(--blue);border-color:var(--blue);background:rgba(79,140,255,.08)}

    .post-list{flex:1;overflow-y:auto;padding:8px}
    .post-item{padding:12px;border-radius:8px;cursor:pointer;margin-bottom:4px;transition:background .15s}
    .post-item:hover{background:var(--surface)}
    .post-item.active{background:var(--surface);border:1px solid var(--blue)}
    .post-item .title{font-size:.88rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .post-item .meta{font-size:.75rem;color:var(--text2);margin-top:4px}
    .post-item .page-icon{margin-right:6px;font-size:.8rem;color:var(--blue)}

    /* ── page groups ── */
    .page-group{margin-bottom:8px}
    .page-group-header{padding:8px 12px;font-size:.72rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;cursor:pointer;display:flex;align-items:center;gap:6px;border-radius:6px;transition:background .15s}
    .page-group-header:hover{background:var(--surface)}
    .page-group-header .arrow{font-size:.6rem;transition:transform .2s}
    .page-group-header .arrow.open{transform:rotate(90deg)}
    .page-group-items{padding-left:8px}

    /* ── data manager ── */
    .data-view{flex:1;overflow-y:auto;padding:16px}
    .data-section{margin-bottom:24px}
    .data-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .data-section-header h3{font-size:1rem;font-weight:600;display:flex;align-items:center;gap:8px}
    .data-section-header h3 i{color:var(--blue)}
    .data-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;transition:border-color .15s}
    .data-card:hover{border-color:var(--blue)}
    .data-card-info{flex:1;min-width:0}
    .data-card-info .name{font-size:.9rem;font-weight:600;margin-bottom:2px}
    .data-card-info .detail{font-size:.78rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .data-card-actions{display:flex;gap:6px;flex-shrink:0;margin-left:12px}
    .data-card-actions .btn{padding:6px 10px;font-size:.75rem}
    .data-form{background:var(--surface);border:1px solid var(--blue);border-radius:10px;padding:16px;margin-bottom:12px}
    .data-form .form-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
    .data-form label{font-size:.78rem;color:var(--text2);display:block;margin-bottom:4px}
    .data-form input,.data-form textarea,.data-form select{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.85rem;font-family:inherit;outline:none}
    .data-form input:focus,.data-form textarea:focus{border-color:var(--blue)}
    .data-form textarea{resize:vertical;min-height:60px}
    .data-form .form-actions{display:flex;gap:8px;justify-content:flex-end}
    .links-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
    .link-row{display:flex;gap:8px;align-items:center}
    .link-row input{flex:1}
    .link-row .btn{padding:6px 10px;font-size:.75rem;flex-shrink:0}
    .team-links{margin-top:8px;font-size:.82rem}
    .team-links a{color:var(--blue);text-decoration:none}
    .team-links a:hover{text-decoration:underline}

    /* Icon picker */
    .icon-picker-trigger{cursor:pointer;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);display:flex;align-items:center;gap:8px;font-size:.85rem;transition:border-color .15s}
    .icon-picker-trigger:hover{border-color:var(--blue)}
    .icon-picker-trigger i{font-size:1.1rem;color:var(--blue)}
    .icon-picker-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center}
    .icon-picker-overlay.show{display:flex}
    .icon-picker-modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;width:520px;max-height:70vh;overflow-y:auto}
    .icon-picker-modal h3{font-size:1rem;margin-bottom:12px}
    .icon-picker-search{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.85rem;font-family:inherit;outline:none;margin-bottom:12px}
    .icon-picker-search:focus{border-color:var(--blue)}
    .icon-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
    .icon-grid-item{padding:10px;text-align:center;border-radius:8px;cursor:pointer;transition:background .15s;font-size:1.1rem}
    .icon-grid-item:hover{background:var(--bg)}
    .icon-grid-item.selected{background:rgba(79,140,255,.15);color:var(--blue)}
    .icon-category{font-size:.75rem;font-weight:700;color:var(--text2);text-transform:uppercase;margin:12px 0 6px;letter-spacing:.5px}

    .main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
    .toolbar{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .toolbar .sep{width:1px;height:24px;background:var(--border)}
    .status{margin-left:auto;font-size:.8rem;color:var(--text2)}

    .meta-bar{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .meta-bar input{padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.85rem;font-family:inherit;outline:none}
    .meta-bar input:focus{border-color:var(--blue)}
    .meta-bar .field{display:flex;align-items:center;gap:6px}
    .meta-bar label{font-size:.8rem;color:var(--text2);white-space:nowrap}

    .editor-area{flex:1;display:flex;overflow:hidden}
    .editor-pane,.preview-pane{flex:1;overflow:hidden;display:flex;flex-direction:column}
    .editor-pane{border-right:1px solid var(--border)}
    .pane-label{padding:8px 16px;font-size:.75rem;color:var(--text2);border-bottom:1px solid var(--border);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
    textarea#editor{flex:1;width:100%;resize:none;padding:16px;background:transparent;color:var(--text);border:none;font-family:'SF Mono','Cascadia Code','Fira Code',Consolas,monospace;font-size:.88rem;line-height:1.8;outline:none;tab-size:2}
    .preview-content{flex:1;padding:16px;overflow-y:auto}
    .preview-content h1{font-size:1.8rem;margin:0 0 16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
    .preview-content h2{font-size:1.4rem;margin:24px 0 12px}
    .preview-content h3{font-size:1.15rem;margin:20px 0 8px}
    .preview-content p{margin:8px 0;line-height:1.8}
    .preview-content code{background:var(--surface);padding:2px 6px;border-radius:4px;font-size:.85rem}
    .preview-content pre{background:var(--surface);padding:16px;border-radius:8px;overflow-x:auto;margin:12px 0}
    .preview-content pre code{background:none;padding:0}
    .preview-content blockquote{border-left:3px solid var(--blue);padding:8px 16px;margin:12px 0;color:var(--text2);background:rgba(79,140,255,.05);border-radius:0 8px 8px 0}
    .preview-content ul,.preview-content ol{padding-left:24px;margin:8px 0}
    .preview-content li{margin:4px 0;line-height:1.7}
    .preview-content a{color:var(--blue)}
    .preview-content img{max-width:100%;border-radius:8px;margin:8px 0}
    .preview-content table{border-collapse:collapse;width:100%;margin:12px 0}
    .preview-content th,.preview-content td{border:1px solid var(--border);padding:8px 12px;text-align:left}
    .preview-content th{background:var(--surface);font-weight:600}
    .preview-content hr{border:none;border-top:1px solid var(--border);margin:24px 0}

    /* ── toast ── */
    .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:.88rem;font-weight:500;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s}
    .toast.show{transform:translateY(0);opacity:1}
    .toast.success{background:var(--green);color:#111}
    .toast.error{background:var(--red);color:#fff}

    @media(max-width:900px){
      .sidebar{width:220px}
      .editor-area{flex-direction:column}
      .editor-pane{border-right:none;border-bottom:1px solid var(--border);flex:none;height:45%}
    }
  </style>
</head>
<body>

  <!-- TOKEN GATE -->
  <div class="gate" id="gate">
    <div class="gate-box">
      <h2>博客编辑器</h2>
      <p>管理 Hexo 博客文章与页面</p>
      <input type="password" id="token-input" placeholder="GitHub Personal Access Token">
      <button onclick="saveToken()">GitHub 模式</button>
      <div style="margin:16px 0;display:flex;align-items:center;gap:12px">
        <div style="flex:1;height:1px;background:var(--border)"></div>
        <span style="font-size:.78rem;color:var(--text2)">或</span>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>
      <button onclick="localMode()" style="background:var(--green);color:#111"><i class="fas fa-folder-open"></i> 本地模式</button>
      <div class="hint">
        <b>GitHub 模式</b>：直接读写远程仓库，需 <code>repo</code> 权限 Token<br>
        <b>本地模式</b>：导入/导出本地 <code>.md</code> 文件，无需 Token
      </div>
    </div>
  </div>

  <!-- APP -->
  <div class="app" id="app">
    <!-- sidebar -->
    <div class="sidebar">
      <div class="sidebar-head">
        <div class="top-row">
          <h3 id="sidebar-title">文章列表</h3>
          <button class="btn btn-blue" onclick="newPost()" id="btn-new"><i class="fas fa-plus"></i> 新建</button>
        </div>
        <div class="sidebar-tabs" id="sidebar-tabs">
          <div class="tab active" data-tab="posts" onclick="switchTab('posts')">文章</div>
          <div class="tab" data-tab="pages" onclick="switchTab('pages')">页面</div>
          <div class="tab" data-tab="data" onclick="switchTab('data')">数据</div>
        </div>
      </div>
      <div class="post-list" id="post-list">
        <div style="padding:20px;text-align:center;color:var(--text2);font-size:.85rem">加载中...</div>
      </div>
    </div>

    <!-- main -->
    <div class="main">
      <div class="toolbar">
        <button class="btn btn-green" onclick="savePost()"><i class="fas fa-save"></i> 保存</button>
        <button class="btn btn-red" onclick="deletePost()" id="btn-delete" style="display:none"><i class="fas fa-trash"></i> 删除</button>
        <div class="sep" id="sep-local" style="display:none"></div>
        <button class="btn btn-ghost" id="btn-import" onclick="importLocal()" style="display:none"><i class="fas fa-file-import"></i> 导入 .md</button>
        <button class="btn btn-ghost" id="btn-export" onclick="exportLocal()" style="display:none"><i class="fas fa-file-export"></i> 导出 .md</button>
        <input type="file" id="file-input" accept=".md,.markdown" style="display:none" onchange="handleImport(event)" multiple>
        <div class="sep"></div>
        <button class="btn btn-ghost" id="btn-template" onclick="showTemplateMenu(event)" style="display:none"><i class="fas fa-puzzle-piece"></i> 插入模板</button>
        <button class="btn btn-ghost" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 退出</button>
        <span class="status" id="status"></span>
      </div>

      <div class="meta-bar" id="meta-bar">
        <div class="field">
          <label>标题</label>
          <input type="text" id="inp-title" placeholder="文章标题" style="width:260px">
        </div>
        <div class="field" id="field-status">
          <label>状态</label>
          <select id="inp-status" style="padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.85rem;font-family:inherit;outline:none;cursor:pointer">
            <option value="draft">草稿</option>
            <option value="pending">待发布</option>
            <option value="published">已发布</option>
          </select>
        </div>
        <div class="field" id="field-tags">
          <label>标签</label>
          <input type="text" id="inp-tags" placeholder="标签1, 标签2" style="width:180px">
        </div>
        <div class="field" id="field-categories">
          <label>分类</label>
          <input type="text" id="inp-categories" placeholder="分类名" style="width:120px">
        </div>
        <div class="field" id="field-author">
          <label>作者</label>
          <input type="text" id="inp-author" placeholder="作者名" style="width:120px">
        </div>
      </div>

      <div class="editor-area" id="editor-area">
        <div class="editor-pane">
          <div class="pane-label">Markdown</div>
          <textarea id="editor" placeholder="在此编写 Markdown 内容..." spellcheck="false"></textarea>
        </div>
        <div class="preview-pane">
          <div class="pane-label">预览</div>
          <div class="preview-content" id="preview"></div>
        </div>
      </div>

      <div class="data-view" id="data-view" style="display:none"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Template dropdown -->
  <div id="template-menu" style="display:none;position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:6px;min-width:200px;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,.4)">
  </div>

  <script>
    const OWNER = 'cmijohnson';
    const REPO = 'cmijohnson.github.io';
    const BRANCH = 'main';
    const POSTS_DIR = 'source/_posts';

    // ── page definitions (grouped) ──
    const PAGE_GROUPS = [
      { name: '网站', pages: [
        { name: '研究', icon: 'fas fa-flask', path: 'source/research/index.md' },
        { name: '关于', icon: 'fas fa-user-graduate', path: 'source/about/index.md' },
        { name: '更新日志', icon: 'fas fa-clock-rotate-left', path: 'source/announcements/index.md' }
      ]},
      { name: '团队', pages: [
        { name: '团队首页', icon: 'fas fa-shield-halved', path: 'source/team/index.md' },
        { name: '团队风采', icon: 'fas fa-users', path: 'source/team/members/index.md' },
        { name: '竞赛成果', icon: 'fas fa-trophy', path: 'source/team/competitions/index.md' },
        { name: '科研项目', icon: 'fas fa-flask', path: 'source/team/research/index.md' },
        { name: '指导教师', icon: 'fas fa-chalkboard-teacher', path: 'source/team/advisors/index.md' }
      ]}
    ];
    const PAGES = PAGE_GROUPS.flatMap(g => g.pages);

    // ── data definitions ──
    const DATA_TYPES = [
      { key: 'members', name: '团队成员', icon: 'fas fa-users', file: 'source/_data/members.json',
        fields: [
          { key: 'name', label: '姓名', type: 'text', required: true },
          { key: 'avatar', label: '头像文字', type: 'text', required: true },
          { key: 'position', label: '职位', type: 'text' },
          { key: 'bio', label: '简介', type: 'text' },
          { key: 'links', label: '链接', type: 'links' }
        ]},
      { key: 'competitions', name: '竞赛成果', icon: 'fas fa-trophy', file: 'source/_data/competitions.json',
        fields: [
          { key: 'name', label: '竞赛名称', type: 'text', required: true },
          { key: 'date', label: '时间', type: 'text' },
          { key: 'result', label: '成绩', type: 'text' },
          { key: 'description', label: '描述', type: 'textarea' },
          { key: 'links', label: '链接', type: 'links' }
        ]},
      { key: 'research', name: '科研项目', icon: 'fas fa-flask', file: 'source/_data/research.json',
        fields: [
          { key: 'title', label: '项目名称', type: 'text', required: true },
          { key: 'date', label: '时间', type: 'text' },
          { key: 'status', label: '状态', type: 'select', options: [{v:'ongoing',l:'进行中'},{v:'completed',l:'已完成'},{v:'planned',l:'计划中'}] },
          { key: 'icon', label: '图标', type: 'text' },
          { key: 'color', label: '颜色', type: 'select', options: [{v:'green',l:'绿色'},{v:'blue',l:'蓝色'}] },
          { key: 'description', label: '描述', type: 'textarea' },
          { key: 'links', label: '链接', type: 'links' }
        ]},
      { key: 'advisors', name: '指导教师', icon: 'fas fa-chalkboard-teacher', file: 'source/_data/advisors.json',
        fields: [
          { key: 'name', label: '姓名', type: 'text', required: true },
          { key: 'title', label: '学院', type: 'text' },
          { key: 'bio', label: '简介', type: 'textarea' },
          { key: 'fields', label: '研究方向', type: 'text' },
          { key: 'email', label: '邮箱', type: 'text' },
          { key: 'links', label: '链接', type: 'links' }
        ]},
      { key: 'timeline', name: '时间轴', icon: 'fas fa-clock', file: 'source/_data/timeline.json',
        fields: [
          { key: 'year', label: '时间', type: 'text', required: true },
          { key: 'title', label: '标题', type: 'text', required: true },
          { key: 'description', label: '描述', type: 'textarea' }
        ]},
      { key: 'news', name: '最新动态', icon: 'fas fa-newspaper', file: 'source/_data/news.json',
        fields: [
          { key: 'date', label: '日期', type: 'text', required: true },
          { key: 'title', label: '标题', type: 'text', required: true },
          { key: 'link', label: '链接', type: 'text' },
          { key: 'icon', label: '图标', type: 'text' }
        ]},
      { key: 'intro', name: '个人介绍', icon: 'fas fa-user-shield', file: 'source/_data/intro.json',
        fields: [
          { key: 'title', label: '标题', type: 'text', required: true },
          { key: 'description', label: '内容', type: 'textarea' },
          { key: 'icon', label: '图标', type: 'text' }
        ]},
      { key: 'changelog', name: '更新日志', icon: 'fas fa-clock-rotate-left', file: 'source/_data/changelog.json',
        fields: [
          { key: 'date', label: '日期', type: 'text', required: true },
          { key: 'title', label: '标题', type: 'text', required: true },
          { key: 'description', label: '描述', type: 'textarea' }
        ]},
      { key: 'site', name: '网站设置', icon: 'fas fa-cog', file: '',
        fields: [
          { key: 'title', label: '站点标题', type: 'text', configPath: '_config.yml', yamlKey: 'title' },
          { key: 'subtitle', label: '副标题', type: 'text', configPath: '_config.yml', yamlKey: 'subtitle' },
          { key: 'siteDescription', label: '站点描述（侧边栏）', type: 'text', configPath: '_config.yml', yamlKey: 'description' },
          { key: 'announcement', label: '公告文字', type: 'textarea', configPath: '_config.butterfly.yml', yamlKey: 'aside.card_announcement.content' }
        ]}
    ];

    let dataStore = {}; // { key: [...] }
    let dataEditing = null; // { typeKey, index } or null
    let groupState = {}; // { groupName: true/false } for collapsed
    let currentFrontMatter = ''; // original front matter string for pages
    let siteSettings = {}; // { title, subtitle, siteDescription, announcement }

    let token = localStorage.getItem('gh_token') || '';
    let isLocal = false;
    let posts = [];
    let currentPost = null; // {name, sha, path} for GitHub, {name, content} for local
    let currentTab = 'posts'; // 'posts' | 'pages'
    let currentPage = null; // page definition from PAGES when in page mode

    // ── mode entry ──
    if (token) initApp();

    function saveToken() {
      token = document.getElementById('token-input').value.trim();
      if (!token) return toast('请输入 Token', 'error');
      localStorage.setItem('gh_token', token);
      isLocal = false;
      initApp();
    }
    function localMode() {
      isLocal = true;
      token = '';
      initApp();
    }
    function logout() {
      localStorage.removeItem('gh_token');
      token = '';
      isLocal = false;
      document.getElementById('gate').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    }

    // ── init ──
    async function initApp() {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('btn-import').style.display = isLocal ? 'inline-flex' : 'none';
      document.getElementById('btn-export').style.display = isLocal ? 'inline-flex' : 'none';
      document.getElementById('sep-local').style.display = isLocal ? 'block' : 'none';
      switchTab('posts');
    }

    // ── tab switching ──
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.sidebar-tabs .tab').forEach(el => {
        el.classList.toggle('active', el.dataset.tab === tab);
      });

      // hide all main views
      document.getElementById('meta-bar').style.display = 'none';
      document.getElementById('editor-area').style.display = 'none';
      document.getElementById('data-view').style.display = 'none';
      document.getElementById('btn-new').style.display = 'none';
      document.getElementById('btn-template').style.display = 'none';
      document.getElementById('btn-delete').style.display = 'none';

      if (tab === 'posts') {
        document.getElementById('sidebar-title').textContent = '文章列表';
        document.getElementById('meta-bar').style.display = 'flex';
        document.getElementById('editor-area').style.display = 'flex';
        document.getElementById('btn-new').style.display = 'inline-flex';
        document.getElementById('btn-template').style.display = 'inline-flex';
        document.getElementById('field-tags').style.display = 'flex';
        document.getElementById('field-categories').style.display = 'flex';
        document.getElementById('field-author').style.display = 'flex';
        document.getElementById('field-status').style.display = 'flex';
        if (!isLocal) loadPosts();
        else { posts = []; renderPostList(); }
      } else if (tab === 'pages') {
        document.getElementById('sidebar-title').textContent = '页面管理';
        document.getElementById('meta-bar').style.display = 'flex';
        document.getElementById('editor-area').style.display = 'flex';
        document.getElementById('field-tags').style.display = 'none';
        document.getElementById('field-categories').style.display = 'none';
        document.getElementById('field-author').style.display = 'none';
        document.getElementById('field-status').style.display = 'none';
        currentPost = null;
        currentPage = null;
        renderPageList();
      } else if (tab === 'data') {
        document.getElementById('sidebar-title').textContent = '数据管理';
        document.getElementById('data-view').style.display = 'block';
        currentPost = null;
        currentPage = null;
        renderSidebarData();
        renderDataView();
      }
    }

    // ── page list (grouped) ──
    function renderPageList() {
      const el = document.getElementById('post-list');
      el.innerHTML = PAGE_GROUPS.map((g, gi) => {
        const open = groupState[g.name] !== false; // default open
        return `<div class="page-group">
          <div class="page-group-header" onclick="toggleGroup('${esc(g.name)}')">
            <span class="arrow ${open ? 'open' : ''}">&#9654;</span> ${esc(g.name)}
          </div>
          <div class="page-group-items" style="display:${open ? 'block' : 'none'}">
            ${g.pages.map((p, pi) => {
              const idx = PAGES.indexOf(p);
              const active = currentPage && currentPage.path === p.path ? 'active' : '';
              return `<div class="post-item ${active}" onclick="openPage(${idx})">
                <div class="title"><i class="${p.icon} page-icon"></i>${esc(p.name)}</div>
                <div class="meta">${p.path}</div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('');
    }
    function toggleGroup(name) {
      groupState[name] = groupState[name] === false ? true : false;
      renderPageList();
    }

    // ── open page ──
    async function openPage(index) {
      const page = PAGES[index];
      currentPage = page;
      currentPost = null;
      document.getElementById('status').textContent = '加载中...';

      if (isLocal) {
        // in local mode, treat pages as empty and let user type
        document.getElementById('inp-title').value = page.name;
        document.getElementById('editor').value = '';
        document.getElementById('preview').innerHTML = '';
        document.getElementById('btn-delete').style.display = 'none';
        document.getElementById('btn-template').style.display = TEMPLATES[page.path] ? 'inline-flex' : 'none';
        document.getElementById('status').textContent = page.path;
        renderPageList();
        return;
      }

      try {
        const data = await ghAPI(`contents/${page.path}?ref=${BRANCH}`);
        const raw = decodeURIComponent(escape(atob(data.content)));
        currentPage.sha = data.sha;
        parseFrontMatter(raw);
        document.getElementById('btn-delete').style.display = 'none';
        document.getElementById('btn-template').style.display = TEMPLATES[page.path] ? 'inline-flex' : 'none';
        document.getElementById('status').textContent = page.path;
        renderPageList();
      } catch (e) {
        toast('打开失败: ' + e.message, 'error');
      }
    }

    // ── github api ──
    async function ghAPI(path, opts = {}) {
      const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/${path}`, {
        ...opts,
        headers: {
          'Authorization': `Bearer ${token}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json',
          ...(opts.headers || {})
        },
        body: opts.body ? JSON.stringify(opts.body) : undefined
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `HTTP ${res.status}`);
      }
      return res.json();
    }

    // ── load posts (GitHub) ──
    async function loadPosts() {
      try {
        const files = await ghAPI(`contents/${POSTS_DIR}?ref=${BRANCH}`);
        posts = files
          .filter(f => f.name.endsWith('.md'))
          .sort((a, b) => b.name.localeCompare(a.name));
        renderPostList();
      } catch (e) {
        toast('加载文章失败: ' + e.message, 'error');
      }
    }

    function renderPostList() {
      const el = document.getElementById('post-list');
      if (!posts.length) {
        el.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text2);font-size:.85rem">${isLocal ? '点击「导入 .md」或「新建」开始' : '暂无文章'}</div>`;
        return;
      }
      el.innerHTML = posts.map((p, i) => {
        const name = p.name.replace('.md', '');
        const active = currentPost && currentPost.name === p.name ? 'active' : '';
        return `<div class="post-item ${active}" onclick='openPost(${i})'>
          <div class="title">${esc(name)}</div>
          <div class="meta">${p.name}</div>
        </div>`;
      }).join('');
    }

    // ── open post ──
    async function openPost(index) {
      const p = posts[index];
      currentPost = p;
      currentPage = null;
      document.getElementById('status').textContent = '加载中...';

      if (isLocal) {
        parseFrontMatter(p.content);
        document.getElementById('btn-delete').style.display = 'inline-flex';
        document.getElementById('btn-template').style.display = 'inline-flex';
        document.getElementById('status').textContent = p.name;
        renderPostList();
        return;
      }

      try {
        const data = await ghAPI(`contents/${p.path}?ref=${BRANCH}`);
        const raw = decodeURIComponent(escape(atob(data.content)));
        currentPost.sha = data.sha;
        parseFrontMatter(raw);
        document.getElementById('btn-delete').style.display = 'inline-flex';
        document.getElementById('btn-template').style.display = 'inline-flex';
        document.getElementById('status').textContent = p.name;
        renderPostList();
      } catch (e) {
        toast('打开失败: ' + e.message, 'error');
      }
    }

    function parseFrontMatter(raw) {
      let title = '', tags = '', categories = '', author = '', status = 'published', body = raw;
      currentFrontMatter = '';
      const fmMatch = raw.match(/^(---\n[\s\S]*?\n---)\n?([\s\S]*)$/);
      if (fmMatch) {
        currentFrontMatter = fmMatch[1] + '\n';
        body = fmMatch[2];
        const fm = fmMatch[1];
        const t = fm.match(/title:\s*(.+)/);
        if (t) title = t[1].replace(/^['"]|['"]$/g, '');
        const tg = fm.match(/tags:\s*\[(.*?)\]/);
        if (tg) tags = tg[1].replace(/['"]/g, '').trim();
        const cg = fm.match(/categories:\s*(.+)/);
        if (cg) categories = cg[1].replace(/^['"]|['"]$/g, '').trim();
        const au = fm.match(/author:\s*(.+)/);
        if (au) author = au[1].replace(/^['"]|['"]$/g, '').trim();
        const st = fm.match(/status:\s*(.+)/);
        if (st) status = st[1].replace(/^['"]|['"]$/g, '').trim();
        const pub = fm.match(/published:\s*(.+)/);
        if (pub && pub[1].trim() === 'false' && status === 'published') status = 'draft';
      }
      document.getElementById('inp-title').value = title;
      document.getElementById('inp-tags').value = tags;
      document.getElementById('inp-categories').value = categories;
      document.getElementById('inp-author').value = author;
      document.getElementById('inp-status').value = status;
      document.getElementById('editor').value = body;
      // update status bar with post status
      const statusLabel = { draft: '草稿', pending: '待发布', published: '已发布' };
      const statusDot = { draft: '#ef4444', pending: '#eab308', published: '#34d399' };
      const el = document.getElementById('status');
      el.innerHTML = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${statusDot[status] || '#34d399'};margin-right:4px"></span>${el.textContent} [${statusLabel[status] || '已发布'}]`;
      updatePreview();
    }

    // ── new post ──
    function newPost() {
      currentPost = null;
      currentPage = null;
      document.getElementById('inp-title').value = '';
      document.getElementById('inp-tags').value = '';
      document.getElementById('inp-categories').value = '';
      document.getElementById('inp-status').value = 'draft';
      document.getElementById('editor').value = '';
      document.getElementById('preview').innerHTML = '';
      document.getElementById('btn-delete').style.display = 'none';
      document.getElementById('btn-template').style.display = 'inline-flex';
      document.getElementById('status').textContent = '新建文章';
      if (currentTab === 'posts') renderPostList();
      document.getElementById('inp-title').focus();
    }

    // ── build front matter ──
    function buildContent() {
      const title = document.getElementById('inp-title').value.trim();
      const tags = document.getElementById('inp-tags').value.trim();
      const categories = document.getElementById('inp-categories').value.trim();
      const author = document.getElementById('inp-author').value.trim();
      const status = document.getElementById('inp-status').value;
      const body = document.getElementById('editor').value;
      if (!title) return null;

      // page mode: save with original front matter intact
      if (currentTab === 'pages' && currentPage) {
        let content;
        if (currentFrontMatter) {
          content = currentFrontMatter + body;
        } else {
          content = body;
        }
        return {
          title,
          filename: currentPage.path.split('/').pop(),
          path: currentPage.path,
          content: content,
          isPage: true
        };
      }

      const now = new Date();
      const date = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
      let fm = `---\ntitle: ${title}\ndate: ${date}`;
      if (author) fm += `\nauthor: ${author}`;
      if (tags) {
        const tagList = tags.split(/[,，]/).map(t => t.trim()).filter(Boolean);
        fm += `\ntags: [${tagList.join(', ')}]`;
      }
      if (categories) fm += `\ncategories: ${categories}`;
      fm += `\nstatus: ${status}`;
      if (status !== 'published') fm += `\npublished: false`;
      fm += `\n---\n`;
      return { title, filename: slugify(title) + '.md', content: fm + body, isPage: false, status };
    }

    // ── save ──
    async function savePost() {
      const data = buildContent();
      if (!data) return toast('请输入标题', 'error');

      // page mode save (GitHub)
      if (data.isPage && !isLocal) {
        if (!currentPage || !currentPage.sha) return toast('请先点击左侧页面列表打开一个页面后再保存', 'error');
        const payload = {
          message: `update: ${data.title}`,
          content: btoa(unescape(encodeURIComponent(data.content))),
          sha: currentPage.sha,
          branch: BRANCH
        };
        document.getElementById('status').textContent = '保存中...';
        try {
          const res = await ghAPI(`contents/${currentPage.path}`, { method: 'PUT', body: payload });
          currentPage.sha = res.content.sha;
          toast('页面保存成功！', 'success');
          document.getElementById('status').textContent = currentPage.path;
        } catch (e) {
          toast('保存失败: ' + e.message, 'error');
        }
        return;
      }

      // page mode save (local)
      if (data.isPage && isLocal) {
        downloadFile(data.path.split('/').pop(), data.content);
        toast('已导出: ' + data.path, 'success');
        return;
      }

      // post save (local)
      if (isLocal) {
        downloadFile(data.filename, data.content);
        const idx = posts.findIndex(p => p.name === data.filename);
        if (idx >= 0) posts[idx].content = data.content;
        else posts.unshift({ name: data.filename, content: data.content });
        currentPost = posts.find(p => p.name === data.filename);
        toast('已导出: ' + data.filename, 'success');
        document.getElementById('btn-delete').style.display = 'inline-flex';
        document.getElementById('status').textContent = data.filename;
        renderPostList();
        return;
      }

      // post save (GitHub)
      const path = `${POSTS_DIR}/${data.filename}`;
      const isUpdate = currentPost && currentPost.name === data.filename;
      const payload = { message: isUpdate ? `update: ${data.title}` : `new post: ${data.title}`, content: btoa(unescape(encodeURIComponent(data.content))), branch: BRANCH };
      if (isUpdate) payload.sha = currentPost.sha;

      document.getElementById('status').textContent = '保存中...';
      try {
        const res = await ghAPI(`contents/${path}`, { method: 'PUT', body: payload });
        currentPost = { name: data.filename, sha: res.content.sha, path };
        const statusLabel = { draft: '草稿', pending: '待发布', published: '已发布' };
        toast('保存成功！', 'success');
        document.getElementById('status').textContent = `${data.filename} [${statusLabel[data.status] || '已发布'}]`;
        document.getElementById('btn-delete').style.display = 'inline-flex';
        await loadPosts();
      } catch (e) {
        toast('保存失败: ' + e.message, 'error');
        document.getElementById('status').textContent = '保存失败';
      }
    }

    // ── delete ──
    async function deletePost() {
      if (!currentPost) return;
      if (!confirm(`确定删除「${currentPost.name}」？`)) return;

      if (isLocal) {
        posts = posts.filter(p => p.name !== currentPost.name);
        toast('已移除', 'success');
        newPost();
        return;
      }

      document.getElementById('status').textContent = '删除中...';
      try {
        await ghAPI(`contents/${currentPost.path}`, {
          method: 'DELETE',
          body: { message: `delete: ${currentPost.name}`, sha: currentPost.sha, branch: BRANCH }
        });
        toast('已删除', 'success');
        newPost();
        await loadPosts();
      } catch (e) {
        toast('删除失败: ' + e.message, 'error');
      }
    }

    // ── local import ──
    function importLocal() {
      document.getElementById('file-input').click();
    }
    function handleImport(e) {
      const files = Array.from(e.target.files);
      if (!files.length) return;
      let loaded = 0;
      files.forEach(f => {
        const reader = new FileReader();
        reader.onload = () => {
          const name = f.name;
          const content = reader.result;
          const idx = posts.findIndex(p => p.name === name);
          if (idx >= 0) posts[idx].content = content;
          else posts.unshift({ name, content });
          loaded++;
          if (loaded === files.length) {
            renderPostList();
            const firstIdx = posts.findIndex(p => p.name === files[0].name);
            openPost(firstIdx);
            toast(`已导入 ${files.length} 个文件`, 'success');
          }
        };
        reader.readAsText(f);
      });
      e.target.value = '';
    }

    // ── local export ──
    function exportLocal() {
      const data = buildContent();
      if (!data) { newPost(); return toast('请输入标题', 'error'); }
      downloadFile(data.filename || data.path.split('/').pop(), data.content);
      toast('已下载', 'success');
    }

    function downloadFile(name, content) {
      const blob = new Blob([content], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // ── preview ──
    const editor = document.getElementById('editor');
    editor.addEventListener('input', updatePreview);
    function updatePreview() {
      document.getElementById('preview').innerHTML = marked.parse(editor.value || '');
    }
    editor.addEventListener('keydown', e => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const s = editor.selectionStart, end = editor.selectionEnd;
        editor.value = editor.value.substring(0, s) + '  ' + editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = s + 2;
        updatePreview();
      }
    });

    // ══════════════════════════════════════
    // ── data management ──
    // ══════════════════════════════════════

    function renderSidebarData() {
      const el = document.getElementById('post-list');
      el.innerHTML = DATA_TYPES.map(dt => {
        const meta = dt.file ? `${(dataStore[dt.key] || []).length} 条记录 · ${dt.file}` : '配置文件';
        return `<div class="post-item ${currentDataType && currentDataType.key === dt.key ? 'active' : ''}" onclick="selectDataType('${dt.key}')">
          <div class="title"><i class="${dt.icon} page-icon"></i>${esc(dt.name)}</div>
          <div class="meta">${meta}</div>
        </div>`;
      }).join('');
    }

    let currentDataType = null;
    function selectDataType(key) {
      currentDataType = DATA_TYPES.find(d => d.key === key);
      dataEditing = null;
      if (key === 'site') {
        renderSidebarData();
        loadSiteSettings().then(() => renderDataView());
      } else {
        loadDataForType(key);
      }
    }

    async function loadDataForType(key) {
      const dt = DATA_TYPES.find(d => d.key === key);
      if (!dt) return;
      document.getElementById('status').textContent = '加载数据...';
      try {
        const data = await ghAPI(`contents/${dt.file}?ref=${BRANCH}`);
        const raw = decodeURIComponent(escape(atob(data.content)));
        dataStore[key] = JSON.parse(raw);
        dataStore[key + '_sha'] = data.sha;
      } catch (e) {
        dataStore[key] = dataStore[key] || [];
        toast('数据文件不存在，将创建新文件', 'error');
      }
      document.getElementById('status').textContent = dt.name + ' · ' + (dataStore[key]||[]).length + ' 条';
      renderDataView();
      renderSidebarData();
    }

    function renderDataView() {
      const container = document.getElementById('data-view');
      if (!currentDataType) {
        container.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--text2)">
          <i class="fas fa-database" style="font-size:3rem;opacity:.3;display:block;margin-bottom:16px"></i>
          <p style="font-size:1rem;margin-bottom:8px">数据管理</p>
          <p style="font-size:.85rem">从左侧选择一种数据类型进行管理</p>
        </div>`;
        return;
      }
      const dt = currentDataType;

      // site settings form
      if (dt.key === 'site') {
        let html = `<div class="data-section">
          <div class="data-section-header">
            <h3><i class="${dt.icon}"></i> ${esc(dt.name)}</h3>
            <button class="btn btn-green" onclick="saveSiteSettings()"><i class="fas fa-save"></i> 保存设置</button>
          </div>
          <div class="data-form" style="border-color:var(--border)">`;
        dt.fields.forEach(f => {
          const val = siteSettings[f.key] || '';
          html += `<div class="form-row"><div style="flex:1">
            <label>${esc(f.label)}</label>`;
          if (f.type === 'textarea') {
            html += `<textarea id="df-${f.key}" rows="3">${esc(val)}</textarea>`;
          } else {
            html += `<input type="text" id="df-${f.key}" value="${esc(val)}">`;
          }
          html += `</div></div>`;
        });
        html += `</div></div>`;
        container.innerHTML = html;
        return;
      }

      const items = dataStore[dt.key] || [];
      let html = `<div class="data-section">
        <div class="data-section-header">
          <h3><i class="${dt.icon}"></i> ${esc(dt.name)} <span style="color:var(--text2);font-weight:400;font-size:.82rem">(${items.length})</span></h3>
          <div style="display:flex;gap:6px">
            <button class="btn btn-blue" onclick="dataAddNew()"><i class="fas fa-plus"></i> 添加</button>
            <button class="btn btn-green" onclick="saveDataType()"><i class="fas fa-save"></i> 保存全部</button>
          </div>
        </div>`;

      // edit form
      if (dataEditing) {
        const item = dataEditing.index >= 0 ? items[dataEditing.index] : {};
        html += `<div class="data-form">
          <div style="font-weight:600;margin-bottom:12px;font-size:.9rem">${dataEditing.index >= 0 ? '编辑' : '新建'}${esc(dt.name)}</div>`;
        dt.fields.forEach(f => {
          html += `<div class="form-row"><div style="flex:1">
            <label>${esc(f.label)}${f.required ? ' *' : ''}</label>`;
          if (f.type === 'links') {
            const links = item[f.key] || [];
            html += `<div class="links-list" id="df-links-list">`;
            links.forEach((lk, li) => {
              html += `<div class="link-row">
                <input type="text" class="df-link-url" placeholder="URL" value="${esc(lk.url||'')}">

    // ── Site Settings ──
    async function loadSiteSettings() {
      try {
        const [cfg, bfcfg] = await Promise.all([
          ghAPI('contents/_config.yml?ref=' + BRANCH),
          ghAPI('contents/_config.butterfly.yml?ref=' + BRANCH)
        ]);
        const cfgText = decodeURIComponent(escape(atob(cfg.content)));
        const bfcfgText = decodeURIComponent(escape(atob(bfcfg.content)));
        siteSettings = {
          _cfgSha: cfg.sha,
          _bfcfgSha: bfcfg.sha,
          title: yamlGet(cfgText, 'title'),
          subtitle: yamlGet(cfgText, 'subtitle'),
          siteDescription: yamlGet(cfgText, 'description'),
          announcement: yamlGet(bfcfgText, 'aside.card_announcement.content') || 'This is my Blog'
        };
      } catch (e) {
        toast('加载设置失败: ' + e.message, 'error');
      }
    }

    function yamlGet(text, dottedKey) {
      const keys = dottedKey.split('.');
      let lines = text.split('\n');
      for (let i = 0; i < keys.length; i++) {
        const key = keys[i];
        let found = false;
        for (let j = 0; j < lines.length; j++) {
          const m = lines[j].match(new RegExp('^' + key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ':\\s*(.*)'));
          if (m) {
            if (i === keys.length - 1) {
              let val = m[1].trim();
              if ((val.startsWith('"') && val.endsWith('"')) || (val.startsWith("'") && val.endsWith("'"))) val = val.slice(1, -1);
              return val;
            }
            // Find nested block
            const indent = lines[j].match(/^(\s*)/)[1].length;
            const nested = [];
            for (let k = j + 1; k < lines.length; k++) {
              const ni = lines[k].match(/^(\s*)/)[1].length;
              if (ni > indent) nested.push(lines[k].substring(indent + 2));
              else if (lines[k].trim() && ni <= indent) break;
            }
            lines = nested;
            found = true;
            break;
          }
        }
        if (!found) return '';
      }
      return '';
    }

    function yamlSet(text, dottedKey, value) {
      const keys = dottedKey.split('.');
      if (keys.length === 1) {
        const re = new RegExp('^(' + keys[0].replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ':\\s*).*$', 'm');
        if (re.test(text)) {
          const needsQuote = /[:#\[\]{}&*!|>'"%@`]/.test(value) || value === '';
          const v = needsQuote ? '"' + value.replace(/"/g, '\\"') + '"' : value;
          return text.replace(re, '$1' + v);
        }
        return text;
      }
      // Nested key like aside.card_announcement.content
      const topKey = keys[0];
      const rest = keys.slice(1);
      const lines = text.split('\n');
      let result = [];
      let inBlock = false;
      let blockIndent = -1;
      let replaced = false;
      for (let i = 0; i < lines.length; i++) {
        const topMatch = lines[i].match(new RegExp('^(' + topKey.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ':\\s*)'));
        if (topMatch && !inBlock) {
          inBlock = true;
          blockIndent = lines[i].match(/^(\s*)/)[1].length;
          result.push(lines[i]);
          continue;
        }
        if (inBlock) {
          const curIndent = lines[i].match(/^(\s*)/)[1].length;
          if (lines[i].trim() && curIndent <= blockIndent) {
            inBlock = false;
          } else {
            const nestedKey = rest.join('.');
            const parts = nestedKey.split('.');
            const leafKey = parts[parts.length - 1];
            const leafRe = new RegExp('^(\\s*)(' + leafKey.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ':\\s*).*$');
            if (leafRe.test(lines[i]) && !replaced) {
              const needsQuote = /[:#\[\]{}&*!|>'"%@`]/.test(value) || value === '';
              const v = needsQuote ? '"' + value.replace(/"/g, '\\"') + '"' : value;
              result.push(lines[i].replace(leafRe, '$1$2' + v));
              replaced = true;
              continue;
            }
          }
        }
        result.push(lines[i]);
      }
      return result.join('\n');
    }

    async function saveSiteSettings() {
      // Read current form values
      const fields = currentDataType.fields;
      const values = {};
      fields.forEach(f => {
        const el = document.getElementById('df-' + f.key);
        if (el) values[f.key] = el.value.trim();
      });
      document.getElementById('status').textContent = '保存中...';
      for (let attempt = 0; attempt < 3; attempt++) {
        try {
          // Fetch current config files (fresh each attempt)
          const [cfgRes, bfcfgRes] = await Promise.all([
            ghAPI('contents/_config.yml?ref=' + BRANCH),
            ghAPI('contents/_config.butterfly.yml?ref=' + BRANCH)
          ]);
          let cfgText = decodeURIComponent(escape(atob(cfgRes.content)));
          let bfcfgText = decodeURIComponent(escape(atob(bfcfgRes.content)));

          // Apply changes
          cfgText = yamlSet(cfgText, 'title', values.title || '');
          cfgText = yamlSet(cfgText, 'subtitle', values.subtitle || '');
          cfgText = yamlSet(cfgText, 'description', values.siteDescription || '');
          bfcfgText = yamlSet(bfcfgText, 'aside.card_announcement.content', values.announcement || '');

          // Save both files
          await Promise.all([
            ghAPI('contents/_config.yml', { method: 'PUT', body: {
              message: 'config: update site settings',
              content: btoa(unescape(encodeURIComponent(cfgText))),
              sha: cfgRes.sha, branch: BRANCH
            }}),
            ghAPI('contents/_config.butterfly.yml', { method: 'PUT', body: {
              message: 'config: update site settings',
              content: btoa(unescape(encodeURIComponent(bfcfgText))),
              sha: bfcfgRes.sha, branch: BRANCH
            }})
          ]);
          toast('网站设置已保存，等待部署生效', 'success');
          document.getElementById('status').textContent = '网站设置 · 已保存';
          // Update local cache
          siteSettings.title = values.title;
          siteSettings.subtitle = values.subtitle;
          siteSettings.siteDescription = values.siteDescription;
          siteSettings.announcement = values.announcement;
          return;
        } catch (e) {
          if (attempt < 2 && /does not match|409/.test(e.message)) {
            document.getElementById('status').textContent = 'SHA 冲突，重试中...';
            continue;
          }
          toast('保存失败: ' + e.message, 'error');
          return;
        }
      }
    }

    async function saveDataType() {
      if (!currentDataType) return;
      const dt = currentDataType;
      const content = JSON.stringify(dataStore[dt.key], null, 2);
      const b64 = btoa(unescape(encodeURIComponent(content)));
      const sha = dataStore[dt.key + '_sha'];
      const payload = { message: `data: update ${dt.key}`, content: b64, branch: BRANCH };
      if (sha) payload.sha = sha;
      document.getElementById('status').textContent = '保存中...';
      try {
        const res = await ghAPI(`contents/${dt.file}`, { method: 'PUT', body: payload });
        dataStore[dt.key + '_sha'] = res.content.sha;
        toast(dt.name + ' 数据已保存！', 'success');
        document.getElementById('status').textContent = dt.name + ' · ' + dataStore[dt.key].length + ' 条';
        // also write root-level copy for homepage access
        const rootCopy = { research: 'source/research.json', intro: 'source/intro.json' };
        if (rootCopy[dt.key]) {
          try {
            let rootSha;
            try { const info = await ghAPI(`contents/${rootCopy[dt.key]}?ref=${BRANCH}`); rootSha = info.sha; } catch(e) {}
            const rp = { message: `data: sync ${dt.key} for homepage`, content: b64, branch: BRANCH };
            if (rootSha) rp.sha = rootSha;
            await ghAPI(`contents/${rootCopy[dt.key]}`, { method: 'PUT', body: rp });
          } catch(e) { /* non-critical */ }
        }
        // regenerate the page HTML
        await regeneratePage(dt.key);
      } catch (e) {
        toast('保存失败: ' + e.message, 'error');
      }
    }

    // ── helpers ──
    function slugify(s) {
      return s.replace(/[^\w一-鿿\- ]/g, '').replace(/\s+/g, '-').toLowerCase() || 'untitled';
    }
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function renderLinks(links) {
      if (!links || !links.length) return '';
      return '<div class="team-links">' + links.map(l =>
        `<a href="${esc(l.url)}" target="_blank" rel="noopener"><i class="fas fa-link"></i> ${esc(l.label||l.url)}</a>`
      ).join(' · ') + '</div>\n';
    }
    function toast(msg, type = 'success') {
      const el = document.getElementById('toast');

    function showTemplateMenu(e) {
      const menu = document.getElementById('template-menu');
      if (menu.style.display === 'block') { menu.style.display = 'none'; return; }

      const key = currentPage ? currentPage.path : '_posts';
      const items = TEMPLATES[key] || TEMPLATES['_posts'] || [];
      if (!items.length) return toast('当前页面无可插入模板', 'error');

      menu.innerHTML = items.map((t, i) =>
        `<div style="padding:8px 12px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:.85rem;color:var(--text)" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background='transparent'" onclick="insertTemplate(${i})">
          <i class="${t.icon}" style="color:var(--blue);width:16px;text-align:center"></i> ${esc(t.label)}
        </div>`
      ).join('');

      const rect = e.target.closest('.btn').getBoundingClientRect();
      menu.style.left = rect.left + 'px';
      menu.style.top = (rect.bottom + 4) + 'px';
      menu.style.display = 'block';

      setTimeout(() => {
        document.addEventListener('click', function close(ev) {
          if (!menu.contains(ev.target)) { menu.style.display = 'none'; document.removeEventListener('click', close); }
        });
      }, 10);
    }

    function insertTemplate(index) {
      const key = currentPage ? currentPage.path : '_posts';
      const items = TEMPLATES[key] || TEMPLATES['_posts'] || [];
      const tpl = items[index];
      if (!tpl) return;

      let code = tpl.code;
      if (key === '_posts') {
        const now = new Date();
        const d = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
        code = code.replace('{{date}}', d);
      }

      const editor = document.getElementById('editor');
      const start = editor.selectionStart;
      const before = editor.value.substring(0, start);
      const after = editor.value.substring(editor.selectionEnd);
      editor.value = before + (before.endsWith('\n') || !before ? '' : '\n') + code + '\n' + after;
      editor.focus();
      editor.selectionStart = editor.selectionEnd = start + code.length + 1;
      updatePreview();
      document.getElementById('template-menu').style.display = 'none';
      toast('模板已插入');
    }
  </script>

  <div class="icon-picker-overlay" id="icon-picker-overlay" onclick="if(event.target===this)closeIconPicker()">
    <div class="icon-picker-modal">
      <h3>选择图标</h3>
      <input type="text" class="icon-picker-search" id="icon-picker-search" placeholder="搜索图标..." oninput="filterIcons()">
      <div id="icon-picker-grid"></div>
    </div>
  </div>

  <script>
    // ── Icon Picker ──
    const ICON_DATA = {
      '常用': ['fas fa-home','fas fa-user','fas fa-users','fas fa-envelope','fas fa-link','fas fa-globe','fas fa-book','fas fa-star','fas fa-heart','fas fa-bell','fas fa-bullhorn','fas fa-search','fas fa-cog','fas fa-edit','fas fa-trash','fas fa-plus','fas fa-check','fas fa-times','fas fa-arrow-right','fas fa-download'],
      '学术': ['fas fa-flask','fas fa-microscope','fas fa-graduation-cap','fas fa-book-open','fas fa-file-alt','fas fa-code','fas fa-laptop-code','fas fa-brain','fas fa-robot','fas fa-database'],
      '安全': ['fas fa-shield-halved','fas fa-lock','fas fa-key','fas fa-bug','fas fa-virus','fas fa-user-secret','fas fa-fingerprint','fas fa-network-wired','fas fa-server','fas fa-cloud'],
      '社交': ['fab fa-github','fab fa-twitter','fab fa-weixin','fab fa-qq','fab fa-telegram','fab fa-discord','fab fa-linkedin','fab fa-youtube','fab fa-bilibili','fas fa-rss'],
      '团队': ['fas fa-trophy','fas fa-medal','fas fa-award','fas fa-chalkboard-teacher','fas fa-user-tie','fas fa-people-group','fas fa-handshake','fas fa-lightbulb','fas fa-rocket','fas fa-clipboard'],
      '文件': ['fas fa-file','fas fa-file-pdf','fas fa-file-word','fas fa-file-code','fas fa-file-image','fas fa-folder','fas fa-folder-open','fas fa-archive','fas fa-cloud-upload-alt','fas fa-save'],
      '其他': ['fas fa-clock','fas fa-calendar','fas fa-clock-rotate-left','fas fa-newspaper','fas fa-chart-bar','fas fa-map-marker-alt','fas fa-tag','fas fa-tags','fas fa-palette','fas fa-music']
    };
    let iconPickerCallback = null;

    function openIconPicker(currentIcon, callback) {
      iconPickerCallback = callback;
      const grid = document.getElementById('icon-picker-grid');
      let html = '';
      for (const [cat, icons] of Object.entries(ICON_DATA)) {
        html += `<div class="icon-category">${cat}</div><div class="icon-grid">`;
        icons.forEach(ic => {
          const sel = ic === currentIcon ? ' selected' : '';
          html += `<div class="icon-grid-item${sel}" onclick="selectIcon('${ic}')" title="${ic}"><i class="${ic}"></i></div>`;
        });
        html += '</div>';
      }
      grid.innerHTML = html;
      document.getElementById('icon-picker-search').value = '';
      document.getElementById('icon-picker-overlay').classList.add('show');
    }

    function closeIconPicker() {
      document.getElementById('icon-picker-overlay').classList.remove('show');
    }

    function selectIcon(icon) {
      closeIconPicker();
      if (iconPickerCallback) iconPickerCallback(icon);
    }

    function filterIcons() {
      const q = document.getElementById('icon-picker-search').value.toLowerCase();
      document.querySelectorAll('.icon-grid-item').forEach(el => {
        el.style.display = el.title.includes(q) ? '' : 'none';
      });
    }
  </script>
