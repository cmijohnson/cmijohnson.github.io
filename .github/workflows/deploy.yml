name: Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Fetch repos
        run: |
          curl -s "https://api.github.com/users/cmijohnson/repos?per_page=100&sort=updated" \
            | jq '[.[] | select(.fork==false and .private==false and .name!="cmijohnson.github.io") | {name:.name,description:.description,language:.language,stars:.stargazers_count,updated:.pushed_at,url:.html_url}]' \
            > source/repos.json

      - name: Build Hexo
        run: npx hexo generate

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
