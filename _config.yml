# Site
title: "cmijohnson's Blog"
subtitle: Computing · Engineering · Research
description: "cmijohnson — 江苏大学 | 信息安全研究与技术博客"
keywords: [blog, research, academic, computer science, 技术, hexo]
author: cmijohnson
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://cmijohnson.github.io
root: /
permalink: blog/:year/:month/:day/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: blog/tags
archive_dir: blog/archives
category_dir: blog/categories

# skip rendering
skip_render:
  - editor/**

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: true

# Home page setting
index_generator:
  path: 'blog'
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Extensions
theme: butterfly

# Deployment
deploy:
  type: ''
