# Butterfly Theme Configuration
# Docs: https://butterfly.js.org/posts/4aa8abbe/

# Menu
menu:
  首页: / || fas fa-home
  归档: /blog/archives/ || fas fa-archive
  研究: /research/ || fas fa-flask
  团队: /team/ || fas fa-shield-halved
  公告: /announcements/ || fas fa-bullhorn
  标签: /tags/ || fas fa-tags
  关于: /about/ || fas fa-user-graduate

# Code Blocks
highlight_theme: light
highlight_copy: true
highlight_lang: true
code_word_wrap: false

# Social
social:
  fab fa-github: https://github.com/cmijohnson || GitHub
  fas fa-globe: https://www.cmiteam.cn || Homepage

# Avatar
avatar: https://github.com/cmijohnson.png

# Favicon
favicon: https://github.com/cmijohnson.png

# Cover
index_img:
default_cover:
  - /img/default.png

# CDN
CDN:
  css:
    fontawesome: https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.1.0/css/all.min.css
  js:

# Footer
footer:
  owner:
    enable: true
    since: 2025
  custom_text: "Academic blog powered by Hexo & Butterfly"
  copyright: true

# Post
post_meta:
  date_type: both
  categories: true
  tags: true

toc:
  enable: true
  number: true

# Math (KaTeX)
math:
  use: katex
  per_page: true
  katex:
    copy_tex: true

# Comments (disabled by default)
comments:
  use:
  lazyload: false

# Analytics (disabled by default)
busuanzi:
  enable: false

# Inject custom CSS
inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">
    - <link rel="stylesheet" href="/css/team.css">
  bottom:
